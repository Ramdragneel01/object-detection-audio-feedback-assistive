# Generated by GitHub Copilot
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: object-detection-audio-feedback-assistive-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install coverage tooling
        run: python -m pip install --upgrade pytest-cov

      - name: Compile check
        run: python -m compileall -q api src tests

      - name: Dependency consistency
        run: python -m pip check

      - name: Run tests
        run: pytest -q --maxfail=1 --cov=api --cov=src
          --cov-report=term-missing:skip-covered --cov-fail-under=50

      - name: Dependency audit
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit -r requirements.txt --progress-spinner off
