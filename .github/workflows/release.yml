# Generated by GitHub Copilot
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: object-detection-audio-feedback-assistive-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall -q api src tests

      - name: Dependency consistency
        run: python -m pip check

      - name: Run tests
        run: pytest -q --maxfail=1

      - name: Dependency audit
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit -r requirements.txt --progress-spinner off

      - name: Package source artifact
        run: tar -czf object-detection-audio-feedback-assistive-source-${{
          github.ref_name }}.tgz --exclude=.git --exclude=.github .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            object-detection-audio-feedback-assistive-source-${{ github.ref_name }}.tgz
